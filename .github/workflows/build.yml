name: Build & Release

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  REGISTRY_GHCR: ghcr.io
  REGISTRY_DOCKERHUB: index.docker.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Lint & Test ──────────────────────────────────────────────
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2.9.1
      - run: cargo fmt --check
      - run: cargo clippy --locked --all-targets -- -D warnings
      - run: cargo test --locked

  # ── Cross-platform Binary Builds ─────────────────────────────
  build-binaries:
    name: Build (${{ matrix.target }})
    needs: [check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            output: ravenclaw-x86_64-unknown-linux-gnu
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            output: ravenclaw-aarch64-unknown-linux-gnu
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            output: ravenclaw-x86_64-unknown-linux-musl
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            output: ravenclaw-x86_64-apple-darwin
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            output: ravenclaw-aarch64-apple-darwin
            archive: tar.gz

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          key: ${{ matrix.target }}
      - name: Install cross-compilation dependencies (musl)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        shell: bash
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -qq -o Acquire::Retries=3
          for pkg in musl-tools libssl-dev pkg-config cmake; do
            for i in 1 2 3; do
              timeout 120 sudo apt-get install -y --no-install-recommends \
                -o Dpkg::Options::=--force-confdef \
                -o Acquire::Retries=3 \
                "$pkg" && break
              echo "apt-get install $pkg attempt $i failed, retrying..." && sleep 5
            done
          done
        timeout-minutes: 20
      - name: Install native dependencies (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        shell: bash
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -qq -o Acquire::Retries=3
          for pkg in libssl-dev pkg-config cmake; do
            for i in 1 2 3; do
              timeout 120 sudo apt-get install -y --no-install-recommends \
                -o Dpkg::Options::=--force-confdef \
                -o Acquire::Retries=3 \
                "$pkg" && break
              echo "apt-get install $pkg attempt $i failed, retrying..." && sleep 5
            done
          done
        timeout-minutes: 10
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/ravenclaw dist/${{ matrix.output }}
          cd dist
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            zip ${{ matrix.output }}.zip ${{ matrix.output }}
          else
            tar czf ${{ matrix.output }}.tar.gz ${{ matrix.output }}
          fi
          shasum -a 256 ${{ matrix.output }} > ${{ matrix.output }}.sha256
          if [[ -f ${{ matrix.output }}.tar.gz ]]; then
            shasum -a 256 ${{ matrix.output }}.tar.gz >> ${{ matrix.output }}.sha256
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.output }}
          path: dist/*
          if-no-files-found: error

  # ── Container Images (multi-arch, multi-registry) ────────────
  containers:
    name: Container Images
    needs: [check]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
      attestations: write
      id-token: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      # ── Log in to registries ──────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        if: >
          github.event_name != 'pull_request' &&
          (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── Generate metadata ─────────────────────────────────────
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}
            ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
          labels: |
            org.opencontainers.image.title=RavenClaw
            org.opencontainers.image.description=Lightweight, secure Rust agent framework
            org.opencontainers.image.vendor=Erling G M Kristiansen
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licenses=AGPL-3.0-or-later

      # ── Build and push to all registries ──────────────────────
      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      # ── Sign container (tagged releases only) ─────────────────
      - name: Sign container with Cosign
        if: startsWith(github.ref, 'refs/tags/v')
        uses: sigstore/cosign-installer@v4.1.2

      - name: Run Cosign sign
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          COSIGN_DEBUG: "1"
        run: |
          cosign sign --yes \
            --use-signing-config=false \
            "${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"

      # ── Attestation (tagged releases only) ────────────────────
      - name: Generate artifact attestation
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # ── Vulnerability scan ────────────────────────────────────
      - name: Run Trivy vulnerability scanner
        continue-on-error: true
        if: >
          github.ref == 'refs/heads/master' ||
          startsWith(github.ref, 'refs/tags/v')
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1
          hide-progress: true

      - name: Upload Trivy results to GitHub Security
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4.36.2
        with:
          sarif_file: trivy-results.sarif
          category: container-scan

      # ── SBOM ──────────────────────────────────────────────────
      - name: Generate SBOM with Syft
        continue-on-error: true
        if: >
          github.ref == 'refs/heads/master' ||
          startsWith(github.ref, 'refs/tags/v')
        uses: anchore/sbom-action@v0.24.0
        with:
          image: ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: spdx-json
          output-file: sbom.spdx.json
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SBOM as artifact
        if: always() && hashFiles('sbom.spdx.json') != ''
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.spdx.json
          if-no-files-found: ignore

  # ── Publish to crates.io (tagged only) ───────────────────────
  publish-cratesio:
    name: Publish to crates.io
    needs: [check]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── GitHub Release (tagged only) ─────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-binaries, containers]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          pattern: ravenclaw-*
          path: dist
          merge-multiple: true
      - name: Organize release assets
        run: |
          mkdir -p release-assets
          find dist -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.sha256" -o -type f ! -name ".*" \) -exec cp {} release-assets/ \;
          ls -lh release-assets/
      - name: Generate release notes
        id: release_notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          git fetch --tags --force
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1 || echo "")
          if [[ -n "$PREV_TAG" ]]; then
            git log --oneline --no-decorate "$PREV_TAG..HEAD" > changelog.txt
          else
            echo "Initial release" > changelog.txt
          fi
      - name: Create Release
        uses: softprops/action-gh-release@v3.0.1
        with:
          tag_name: ${{ steps.release_notes.outputs.tag }}
          name: RavenClaw ${{ steps.release_notes.outputs.tag }}
          body_path: changelog.txt
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: true
