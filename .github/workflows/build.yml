name: Build & Release

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Lint & Test ──────────────────────────────────────────────
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --locked --all-targets -- -D warnings
      - run: cargo test --locked

  # ── Cross-platform Binary Builds ─────────────────────────────
  build-binaries:
    name: Build (${{ matrix.target }})
    needs: [check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            output: ravenclaw-x86_64-unknown-linux-gnu
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            output: ravenclaw-aarch64-unknown-linux-gnu
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            output: ravenclaw-x86_64-unknown-linux-musl
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            output: ravenclaw-x86_64-apple-darwin
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            output: ravenclaw-aarch64-apple-darwin
            archive: tar.gz

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/ravenclaw dist/${{ matrix.output }}
          # Create compressed archive
          cd dist
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            zip ${{ matrix.output }}.zip ${{ matrix.output }}
          else
            tar czf ${{ matrix.output }}.tar.gz ${{ matrix.output }}
          fi
          # Generate SHA256 checksum
          shasum -a 256 ${{ matrix.output }} > ${{ matrix.output }}.sha256
          if [[ -f ${{ matrix.output }}.tar.gz ]]; then
            shasum -a 256 ${{ matrix.output }}.tar.gz >> ${{ matrix.output }}.sha256
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/*
          if-no-files-found: error

  # ── Multi-arch Docker Image ──────────────────────────────────
  docker:
    name: Docker
    needs: [check]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix=
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Publish to crates.io (tagged only) ───────────────────────
  publish-cratesio:
    name: Publish to crates.io
    needs: [check]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── GitHub Release (tagged only) ─────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-binaries, docker, publish-cratesio]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: ravenclaw-*
          path: dist
          merge-multiple: true
      - name: Organize release assets
        run: |
          mkdir -p release-assets
          # Move all archives, checksums, and binaries into release-assets
          find dist -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.sha256" -o -type f ! -name ".*" \) -exec cp {} release-assets/ \;
          ls -lh release-assets/
      - name: Generate release notes
        id: release_notes
        run: |
          # Extract version from tag
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          # Generate changelog from commits since last tag
          git fetch --tags --force
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1 || echo "")
          if [[ -n "$PREV_TAG" ]]; then
            git log --oneline --no-decorate "$PREV_TAG..HEAD" > changelog.txt
          else
            echo "Initial release" > changelog.txt
          fi
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_notes.outputs.tag }}
          name: RavenClaw ${{ steps.release_notes.outputs.tag }}
          body_path: changelog.txt
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: true
