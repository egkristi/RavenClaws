name: Container Build

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    # PRs only build (no push) — useful for checking Dockerfile changes
  schedule:
    # Weekly security scan of the latest image
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      push_registries:
        description: "Registries to push to"
        required: true
        default: "ghcr"
        type: choice
        options:
          - ghcr
          - dockerhub
          - both

env:
  REGISTRY_GHCR: ghcr.io
  REGISTRY_DOCKERHUB: index.docker.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Build and push container images ──────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
      attestations: write
      id-token: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v7

      # ── Setup Docker Buildx with caching ──────────────────────
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      # ── Log in to registries ──────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        if: >
          github.event_name != 'pull_request' &&
          (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v') ||
           github.event_name == 'workflow_dispatch')
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── Generate metadata ─────────────────────────────────────
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}
            ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
          labels: |
            org.opencontainers.image.title=RavenClaw
            org.opencontainers.image.description=Lightweight, secure Rust agent framework
            org.opencontainers.image.vendor=Erling G M Kristiansen
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licenses=AGPL-3.0-or-later

      # ── Build and push ────────────────────────────────────────
      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      # ── Generate attestation (tagged releases only) ───────────
      - name: Generate artifact attestation
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # ── Vulnerability scan with Trivy ─────────────────────────
      - name: Run Trivy vulnerability scanner
        continue-on-error: true
        if: >
          github.event_name != 'pull_request' &&
          (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1
          hide-progress: true

      - name: Upload Trivy results to GitHub Security
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4.36.2
        with:
          sarif_file: trivy-results.sarif
          category: container-scan

      # ── Generate SBOM ─────────────────────────────────────────
      - name: Generate SBOM with Syft
        continue-on-error: true
        if: >
          github.event_name != 'pull_request' &&
          (github.ref == 'refs/heads/master' ||
          startsWith(github.ref, 'refs/tags/v'))
        uses: anchore/sbom-action@v0.24.0
        with:
          image: ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: spdx-json
          output-file: sbom.spdx.json
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SBOM as artifact
        if: always() && hashFiles('sbom.spdx.json') != ''
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.spdx.json
          if-no-files-found: ignore

  # ── Cosign signing (tagged releases only) ────────────────────
  sign:
    name: Sign Container
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      packages: write
      id-token: write
    steps:
      - uses: sigstore/cosign-installer@v4.1.2

      - name: Sign container image
        env:
          COSIGN_DEBUG: "1"
        run: |
          cosign sign --yes \
            --use-signing-config=false \
            "${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.digest }}"
