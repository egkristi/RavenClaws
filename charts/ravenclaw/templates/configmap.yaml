apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ravenclaw.fullname" . }}-config
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "ravenclaw.labels" . | nindent 4 }}
data:
  ravenclaw.toml: |
    [llm]
    endpoint = "{{ .Values.config.llm.endpoint }}"
    model = "{{ .Values.config.llm.model }}"
    timeout_secs = {{ .Values.config.llm.timeout_secs }}

    {{- if .Values.config.ravenfabric.endpoint }}
    [ravenfabric]
    endpoint = "{{ .Values.config.ravenfabric.endpoint }}"
    remote_exec = {{ .Values.config.ravenfabric.remote_exec | default false }}
    allowed_hosts = {{ .Values.config.ravenfabric.allowed_hosts | default list | toJson }}
    {{- end }}

    [security]
    require_tls = {{ .Values.config.security.require_tls }}
    audit_log = {{ .Values.config.security.audit_log }}
    token_lifetime_secs = {{ .Values.config.security.token_lifetime_secs | default 0 }}

    [runtime]
    workdir = "{{ .Values.config.runtime.workdir }}"
    max_agents = {{ .Values.config.runtime.max_agents }}
    health_interval_secs = {{ .Values.config.runtime.health_interval_secs }}

    {{- if .Values.config.telemetry.otel_endpoint }}
    [telemetry]
    otel_endpoint = "{{ .Values.config.telemetry.otel_endpoint }}"
    otel_service_name = "{{ .Values.config.telemetry.otel_service_name | default "ravenclaw" }}"
    otel_disabled = {{ .Values.config.telemetry.otel_disabled | default false }}
    {{- end }}
