{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ravenclaw.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "ravenclaw.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ravenclaw.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: {{ .Values.service.port }}
          protocol: TCP
      {{- if .Values.networkPolicy.ingressRules }}
      {{- toYaml .Values.networkPolicy.ingressRules | nindent 4 }}
      {{- end }}
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
      {{- if .Values.networkPolicy.egressRules }}
      {{- toYaml .Values.networkPolicy.egressRules | nindent 4 }}
      {{- end }}
{{- end }}
