{{- if .Values.secrets | keys | len | gt 0 -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ravenclaws.fullname" . }}-secrets
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "ravenclaws.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.secrets }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
