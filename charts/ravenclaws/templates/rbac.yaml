{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "ravenclaws.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "ravenclaws.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
  {{- with .Values.rbac.extraRules }}
    {{- toYaml . | nindent 2 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "ravenclaws.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "ravenclaws.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "ravenclaws.serviceAccountName" . }}
    namespace: {{ .Release.Namespace | quote }}
roleRef:
  kind: Role
  name: {{ include "ravenclaws.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
