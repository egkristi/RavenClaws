---
# RavenClaws K8s Test Deployment
# Uses hostNetwork for local LiteLLM access during verification
# This is a TEST variant — for production, use deployment.yaml with in-cluster LiteLLM
apiVersion: v1
kind: Namespace
metadata:
  name: ravenclaws-test
  labels:
    app.kubernetes.io/name: ravenclaws
    app.kubernetes.io/part-of: ravenclaws-test

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ravenclaws-config
  namespace: ravenclaws-test
data:
  ravenclaws.toml: |
    [llm]
    endpoint = "http://host.docker.internal:4000"
    model = "best-coding"
    timeout_secs = 30

    [security]
    require_tls = false
    audit_log = true

    [runtime]
    workdir = "/workspace"
    max_agents = 3
    health_interval_secs = 10

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ravenclaws
  namespace: ravenclaws-test
  labels:
    app.kubernetes.io/name: ravenclaws
    app.kubernetes.io/component: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ravenclaws
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ravenclaws
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: ravenclaws
          image: ravenclaws-verify:latest
          imagePullPolicy: IfNotPresent
          args:
            - "--serve"
            - "--config"
            - "/config/ravenclaws.toml"
          env:
            - name: RUST_LOG
              value: "info"
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: workspace
              mountPath: /workspace
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 65532
            runAsGroup: 65532
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: ravenclaws-config
        - name: workspace
          emptyDir:
            sizeLimit: 512Mi
      terminationGracePeriodSeconds: 15
