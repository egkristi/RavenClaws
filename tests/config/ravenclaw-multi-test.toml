# RavenClaw multi-model test configuration
[llm]
provider = "litellm"
endpoint = "http://localhost:4000"
model = "best-coding"
timeout_secs = 60

[[llms]]
provider = "litellm"
endpoint = "http://localhost:4000"
model = "best-coding"
timeout_secs = 60

[[llms]]
provider = "litellm"
endpoint = "http://localhost:4000"
model = "claude-sonnet"
timeout_secs = 60

[[llms]]
provider = "litellm"
endpoint = "http://localhost:4000"
model = "deepseek-v4-pro"
timeout_secs = 60

[security]
require_tls = false
audit_log = false

[runtime]
workdir = "/tmp/ravenclaw-test"
max_agents = 5
health_interval_secs = 10
